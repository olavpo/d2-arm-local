services:
  db:
    image: ghcr.io/baosystems/postgis:16-3.5
    environment:
      POSTGRES_USER: dhis
      POSTGRES_PASSWORD: dhis
      POSTGRES_DB: dhis2
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dhis -d dhis2"]
      interval: 5s
      timeout: 5s
      retries: 5

  tomcat:
    image: tomcat:10-jdk17
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-8080}:8080"
    environment:
      DHIS2_HOME: /DHIS2_home
      CATALINA_OPTS: "-Ddhis2.home=/DHIS2_home -Dlog4j2.configurationFile=/DHIS2_home/log4j2.xml"
    volumes:
      - ./DHIS2_HOME:/DHIS2_home
      - ./logs:/usr/local/tomcat/logs
      - ./temp:/usr/local/tomcat/temp
      - ./webapps:/usr/local/tomcat/webapps
      - ./server.xml:/usr/local/tomcat/conf/server.xml

volumes:
  db_data: